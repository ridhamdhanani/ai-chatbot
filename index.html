<!DOCTYPE html>
<html>
<head>
    <title>JustChat</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body { margin:0; font-family:Arial; background:#343541; color:white; }

        .app { display:flex; height:100vh; }

        .sidebar {
            width:240px;
            background:#202123;
            padding:10px;
        }

        .chat-item {
            padding:8px;
            cursor:pointer;
            display:flex;
            justify-content:space-between;
        }

        .chat-item:hover { background:#2a2b32; }

        .main { flex:1; display:flex; flex-direction:column; }

        .topbar {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:10px;
            background:#202123;
            border-bottom:1px solid #333;
        }

        .chat-box {
            flex:1;
            padding:20px;
            overflow-y:auto;
        }

        .row { display:flex; margin:12px 0; }

        .user { justify-content:flex-end; }
        .bot { justify-content:flex-start; }

        .msg {
            max-width:65%;
            padding:14px;
            border-radius:14px;
            line-height:1.6;
            font-size:14px;
        }

        .user .msg { background:#3b82f6; }
        .bot .msg { background:#444654; }

        /* Markdown improvements */
        .msg p { margin: 6px 0; }
        .msg ul { margin: 6px 0 6px 18px; }
        .msg code {
            background:#222;
            padding:2px 6px;
            border-radius:4px;
        }

        .avatar {
            width:32px;
            height:32px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:12px;
            font-weight:bold;
            margin:0 8px;
        }

        .user .avatar { background:#3b82f6; }
        .bot .avatar { background:#10a37f; }

        .input-area {
            display:flex;
            padding:10px;
            background:#40414f;
        }

        input {
            flex:1;
            padding:10px;
            border:none;
            outline:none;
            border-radius:6px;
        }

        button {
            padding:8px 12px;
            margin-left:5px;
            background:#10a37f;
            border:none;
            border-radius:6px;
            color:white;
            cursor:pointer;
        }

        .typing-text {
            font-style: italic;
            opacity: 0.7;
        }

        #loginBox {
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%, -50%);
            background:#202123;
            padding:20px;
            border-radius:10px;
            display:flex;
            flex-direction:column;
        }

        #loginBox input {
            margin-bottom:10px;
        }
    </style>
</head>

<body>

<div id="loginBox">
    <h3>Login</h3>
    <input id="username" placeholder="Username">
    <input id="password" placeholder="Password" type="password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
</div>

<div class="app" id="app" style="display:none;">

    <div class="sidebar">
        <button onclick="newChat()">+ New</button>
        <div id="list"></div>
    </div>

    <div class="main">

        <div class="topbar">
            <div><strong>JustChat</strong></div>
            <button onclick="logout()">Logout</button>
        </div>

        <div id="chat" class="chat-box"></div>

        <div class="input-area">
            <input id="input" placeholder="Send a message..." />
            <button onclick="send()">Send</button>
        </div>

    </div>

</div>

<script>
let token = localStorage.getItem("token");

function showChat() {
    loginBox.style.display = "none";
    app.style.display = "flex";
}

function showLogin() {
    loginBox.style.display = "flex";
    app.style.display = "none";
}

if (token) showChat();

function logout() {
    localStorage.removeItem("token");
    token = null;
    showLogin();
}

async function login() {
    const res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: username.value,
            password: password.value
        })
    });

    const data = await res.json();

    if (data.token) {
        token = data.token;
        localStorage.setItem("token", token);
        showChat();
    }
}

async function register() {
    await fetch("/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: username.value,
            password: password.value
        })
    });
}

let chats = {};
let sessionId = null;

function newChat(){
    sessionId = Math.random().toString(36).slice(2);
    chats[sessionId] = { title: "New Chat", messages: [] };
    render();
}

function render(){
    list.innerHTML = "";
    Object.keys(chats).forEach(id => {
        const d = document.createElement("div");
        d.className = "chat-item";
        d.innerHTML = `<span onclick="load('${id}')">${chats[id].title}</span>`;
        list.appendChild(d);
    });
}

function load(id){
    sessionId = id;
    chat.innerHTML = "";
    chats[id].messages.forEach(m => add(m.text, m.role, false));
}

function add(text, role, saveMsg=true){
    const row = document.createElement("div");
    row.className = "row " + role;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.innerText = role === "user" ? "U" : "AI";

    const msg = document.createElement("div");
    msg.className = "msg";
    msg.innerHTML = marked.parse(text);

    if (role === "bot") {
        row.appendChild(avatar);
        row.appendChild(msg);
    } else {
        row.appendChild(msg);
        row.appendChild(avatar);
    }

    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;

    if (saveMsg) chats[sessionId].messages.push({ text, role });

    return msg;
}

async function send(){
    const input = document.getElementById("input");
    if (!input.value) return;

    if (!sessionId) newChat();

    const userText = input.value;
    input.value = "";
    input.focus();

    add(userText, "user");

    const bot = add('<div class="typing-text">thinking...</div>', "bot");

    const res = await fetch(`/chat?q=${encodeURIComponent(userText)}&session_id=${sessionId}&token=${token}`);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    let result = "";

    while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value);
        const lines = chunk.split("\n");

        for (let line of lines) {
            if (line.startsWith("data: ")) {
                const text = line.replace("data: ", "");
                result += text;
                bot.innerHTML = marked.parse(result);
            }
        }
    }

    // ✅ Suggest next step
    result += "\n\n---\n💡 *You can ask me more about this, or explore a related topic!*";

    bot.innerHTML = marked.parse(result);

    chats[sessionId].messages[chats[sessionId].messages.length - 1].text = result;
}

input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
    }
});
</script>

</body>
</html>
